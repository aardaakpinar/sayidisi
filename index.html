<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="9 haneli sayıdan olmayan rakamı bulabilir misin?">
    <meta name="theme-color" content="#6366f1">
    <title>SayıDışı</title>

    <!-- Open Graph (paylaşım için) -->
    <meta property="og:title" content="SayıDışı">
    <meta property="og:description" content="9 haneli sayıdan olmayan rakamı bulabilir misin?">
    <meta property="og:image" content="https://aardaakpinar.github.io/assets/images/logos/sayidisi.png">
    <link rel="shortcut icon" type="image/png" href="https://aardaakpinar.github.io/assets/images/logos/sayidisi.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0078ff">

    <!-- iOS için -->
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Tailwind CSS CDN -->
     <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/tailwind.config.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-background min-h-screen flex flex-col">
    <!-- Header -->
    <header class="w-full border-b border-border bg-surface/80 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-lg mx-auto py-3 flex items-center justify-between px-6 sm:px-0">
            <!-- Title -->
            <div class="flex items-center gap-3">
                <div class="block">
                    <h1 class="text-lg font-bold tracking-tight">SayıDışı</h1>
                    <p class="text-xs text-gray-500">Eksik Rakamı Bul</p>
                </div>
            </div>
            
            <!-- Stats in Header -->
            <div class="flex items-center gap-4 sm:gap-6">
                <!-- Score -->
                <div class="text-center">
                    <p class="text-[10px] sm:text-xs text-gray-500 uppercase tracking-wider">Puan</p>
                    <p id="score" class="text-xl sm:text-2xl font-bold font-mono text-white">0</p>
                </div>
                
                <!-- High Score -->
                <div class="text-center">
                    <p class="text-[10px] sm:text-xs text-gray-500 uppercase tracking-wider">En Yüksek</p>
                    <p id="highScore" class="text-xl sm:text-2xl font-bold font-mono text-primary">0</p>
                </div>
                <button id="info" class="w-10 h-10 rounded-xl border border-border bg-surface-light hover:bg-border transition-colors flex items-center justify-center group">
                    <svg class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-8 gap-8">

        <!-- Number Display (Tiles) -->
        <div class="w-full max-w-lg">
            <div class="bg-surface border border-border rounded-3xl p-6">
                <p class="text-center text-xs text-gray-500 uppercase tracking-wider mb-4">Sayıda Olmayan Rakamı Bul</p>
                <div class="grid grid-cols-9 gap-2">
                    <div id="tile-0" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-1" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-2" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-3" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-4" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-5" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-6" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-7" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                    <div id="tile-8" class="tile aspect-square bg-surface-light border border-border rounded-xl flex items-center justify-center text-2xl md:text-3xl font-bold font-mono text-white">-</div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full max-w-lg">
            <div class="h-3 bg-surface-light rounded-full overflow-hidden border border-border">
                <div id="progress" class="h-full bg-gradient-to-r from-primary to-primary-dark rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- Number Buttons -->
        <div class="w-full max-w-lg">
            <div class="grid grid-cols-3 gap-3">
                <button id="7" onclick="checkNumber(7)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">7</button>
                <button id="8" onclick="checkNumber(8)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">8</button>
                <button id="9" onclick="checkNumber(9)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">9</button>
                <button id="4" onclick="checkNumber(4)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">4</button>
                <button id="5" onclick="checkNumber(5)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">5</button>
                <button id="6" onclick="checkNumber(6)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">6</button>
                <button id="1" onclick="checkNumber(1)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">1</button>
                <button id="2" onclick="checkNumber(2)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">2</button>
                <button id="3" onclick="checkNumber(3)" class="num-btn h-16 bg-surface-light border border-border rounded-2xl text-2xl font-bold font-mono text-white hover:border-primary hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">3</button>
            </div>
        </div>
    </main>

    <!-- Footer --> 
    <footer class="w-full border-t border-border bg-surface/50 py-4"> 
        <div class="max-w-2xl mx-auto px-4 text-center"> 
            <p class="text-xs text-gray-600">Numpad veya ekrandaki butonları kullanarak oyna</p> 
        </div> 
    </footer>

    <!-- Modal -->
    <div id="modal" class="modal hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80">
        <div class="modal-content bg-surface border border-border rounded-3xl max-w-md w-full max-h-[80vh] overflow-y-auto">
            <div class="sticky top-0 bg-surface border-b border-border px-6 py-4 flex items-center justify-between rounded-t-3xl">
                <h2 class="text-lg font-bold">Nasıl Oynanır?</h2>
                <button class="close-btn w-8 h-8 rounded-lg bg-surface-light border border-border hover:bg-border transition-colors flex items-center justify-center">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="p-6 text-gray-300 space-y-6">
                <!-- Content will be inserted by JS -->
            </div>
        </div>
    </div>

    <!-- Game Script -->
    <script src="assets/script.js"></script>
    <script async="" src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
